<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>En-Suite 3D Planner | en-suite.co.uk</title>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#fff; color:#333; overflow:hidden; }
    #container { display:flex; height:100vh; }
    #left { width:340px; background:#fff; padding:20px; overflow-y:auto; border-right:4px solid #d4af37; }
    #canvas-container { flex:1; background:#111; position:relative; }
    #right { width:300px; background:#fff; padding:20px; border-left:4px solid #d4af37; }
    h1 { color:#d4af37; font-size:28px; }
    button, select { width:100%; padding:12px; margin:8px 0; background:#d4af37; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer; }
    button:hover { background:#b38e2e; }
    .control-panel { background:#f8f8f8; padding:15px; border:2px solid #d4af37; margin-top:15px; border-radius:8px; }
    input[type="range"] { accent-color:#d4af37; width:100%; }
  </style>
</head>
<body>
  <div id="container">
    <div id="left">
      <h1>En-Suite 3D Planner</h1>
      
      <button onclick="addInnerRoom()">➕ Add Inner En-Suite Room (1.5×2m)</button>
      
      <label style="margin-top:20px;display:block;">Main Room Size</label>
      <input type="range" id="mainWidth" min="3" max="8" step="0.1" value="5" oninput="updateMainRoom()">
      <span id="mainWVal">5.0</span>m × 
      <input type="range" id="mainLength" min="3" max="8" step="0.1" value="4" oninput="updateMainRoom()">
      <span id="mainLVal">4.0</span>m

      <h3 style="margin-top:25px;color:#d4af37;">Fixtures</h3>
      <select id="fixtureSelect">
        <option value="">— Choose —</option>
        <option value="0">🚽 Toilet</option>
        <option value="1">🪒 Basin</option>
        <option value="2">🚿 Shower</option>
        <option value="3">🛁 Bath</option>
        <option value="4">🪞 Vanity</option>
        <option value="5">🔥 Radiator</option>
        <option value="6">🚪 Door</option>
        <option value="7">🪟 Window</option>
      </select>
      <button onclick="addSelectedFixture()">Add Fixture</button>

      <h3 style="margin-top:25px;color:#d4af37;">Pipes</h3>
      <select id="pipeSelect">
        <option value="">— Choose —</option>
        <option value="0">🔴 Hot Water</option>
        <option value="1">🔵 Cold Water</option>
        <option value="2">🟠 CH Pipe</option>
        <option value="3">🟤 Drainage</option>
      </select>
      <button onclick="addSelectedPipe()">Add Pipe</button>

      <label><input type="checkbox" id="xray" checked onchange="toggleXRay()"> X-Ray Walls (auto fade when close)</label>
      <button onclick="saveDesign()" style="margin-top:30px;background:#111;">💾 Save Design</button>
    </div>

    <div id="canvas-container"></div>

    <div id="right">
      <div id="itemControls" class="control-panel" style="display:none;">
        <h3>Selected Item Controls</h3>
        <label>Rotate Y: <span id="rotVal">0</span>°</label>
        <input type="range" id="rotateSlider" min="-180" max="180" value="0" oninput="rotateSelected()">
        <label>Scale: <span id="scaleVal">1.0</span></label>
        <input type="range" id="scaleSlider" min="0.5" max="3" step="0.1" value="1" oninput="scaleSelected()">
        <button onclick="deleteSelected()">Delete Item</button>
      </div>
      <button onclick="getQuote()">Request Quote →</button>
    </div>
  </div>

  <script>
    // === THREE.JS SETUP ===
    let scene, camera, renderer, controls;
    let mainFloor, mainWalls = [], innerFloor, innerWalls = [];
    let placedItems = [];
    let selectedItem = null;
    let xrayEnabled = true;

    const fixturesData = [
      {name:"Toilet", color:0x555555, size:[0.45,0.55,0.75]},
      {name:"Basin", color:0xeeeeee, size:[0.6,0.25,0.55]},
      {name:"Shower", color:0x777777, size:[0.9,2.1,0.9]},
      {name:"Bath", color:0xffffff, size:[1.7,0.65,0.85]},
      {name:"Vanity", color:0x222222, size:[1.0,0.85,0.55]},
      {name:"Radiator", color:0x444444, size:[0.35,1.05,0.65]},
      {name:"Door", color:0x8B4513, size:[0.1,2.1,0.9]},
      {name:"Window", color:0xA0D6FF, size:[1.3,1.2,0.05]}
    ];

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x111111);
      camera = new THREE.PerspectiveCamera(60, window.innerWidth*0.62/window.innerHeight, 0.1, 1000);
      camera.position.set(7, 7, 7);

      renderer = new THREE.WebGLRenderer({antialias:true});
      renderer.setSize(window.innerWidth*0.62, window.innerHeight);
      document.getElementById('canvas-container').appendChild(renderer.domElement);

      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;

      scene.add(new THREE.AmbientLight(0xffffff, 0.7));
      const sun = new THREE.DirectionalLight(0xffffff, 0.8);
      sun.position.set(10, 15, 10);
      scene.add(sun);

      createMainRoom(5, 4);
      animate();
    }

    function createMainRoom(w=5, l=4) {
      if (mainFloor) scene.remove(mainFloor);
      mainWalls.forEach(w => scene.remove(w)); mainWalls = [];

      mainFloor = new THREE.Mesh(new THREE.PlaneGeometry(w, l), new THREE.MeshStandardMaterial({color: 0xcccccc}));
      mainFloor.rotation.x = -Math.PI/2;
      scene.add(mainFloor);

      const wallMat = new THREE.MeshStandardMaterial({color: 0xeeeeee, side: THREE.DoubleSide});
      const h = 2.5;
      const positions = [[0,h/2,l/2,0], [0,h/2,-l/2,Math.PI], [w/2,h/2,0,Math.PI/2], [-w/2,h/2,0,-Math.PI/2]];
      positions.forEach(p => {
        const wall = new THREE.Mesh(new THREE.PlaneGeometry(w, h), wallMat);
        wall.position.set(p[0], p[1], p[2]);
        wall.rotation.y = p[3];
        scene.add(wall);
        mainWalls.push(wall);
      });
    }

    function addInnerRoom() {
      if (innerFloor) return; // one inner room for now
      innerFloor = new THREE.Mesh(new THREE.PlaneGeometry(2, 1.5), new THREE.MeshStandardMaterial({color: 0xbbbbbb}));
      innerFloor.rotation.x = -Math.PI/2;
      innerFloor.position.set(1, 0.01, 1);
      scene.add(innerFloor);

      const wallMat = new THREE.MeshStandardMaterial({color: 0xeeeeee, side: THREE.DoubleSide});
      const h = 2.5;
      innerWalls = [];
      const iw = 2, il = 1.5;
      const ipos = [[0,h/2,il/2,0], [0,h/2,-il/2,Math.PI], [iw/2,h/2,0,Math.PI/2], [-iw/2,h/2,0,-Math.PI/2]];
      ipos.forEach((p,i) => {
        const wall = new THREE.Mesh(new THREE.PlaneGeometry(i===0||i===1 ? iw : il, h), wallMat);
        wall.position.set(p[0]+1, p[1], p[2]+1);
        wall.rotation.y = p[3];
        scene.add(wall);
        innerWalls.push(wall);
      });
    }

    function addFixture(i) {
      const data = fixturesData[i];
      const geo = new THREE.BoxGeometry(...data.size); // improved proportions
      const mat = new THREE.MeshStandardMaterial({color: data.color});
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(0, data.size[1]/2, 0);
      mesh.userData = {name: data.name, scale: 1};
      scene.add(mesh);
      placedItems.push(mesh);
    }

    function addPipe(type) {
      const colors = [0xff0000, 0x00aaff, 0xff8800, 0x555555];
      const geo = new THREE.CylinderGeometry(0.04, 0.04, 2, 16);
      const mat = new THREE.MeshStandardMaterial({color: colors[type]});
      const mesh = new THREE.Mesh(geo, mat);
      mesh.rotation.x = Math.PI/2;
      mesh.position.set(0, 0.5, 0);
      mesh.userData = {name: "Pipe"};
      scene.add(mesh);
      placedItems.push(mesh);
    }

    // Drag + Select
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let selected = null;

    window.addEventListener('pointerdown', e => {
      if (e.button !== 0) return;
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(placedItems);
      if (hits.length) {
        selected = hits[0].object;
        selectedItem = selected;
        controls.enabled = false;
        showControls();
      }
    });

    window.addEventListener('pointermove', e => {
      if (!selected) return;
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObject(mainFloor || floor);
      if (hits.length) {
        selected.position.x = hits[0].point.x;
        selected.position.z = hits[0].point.z;
      }
    });

    window.addEventListener('pointerup', () => { if (selected) controls.enabled = true; selected = null; });

    // Controls for selected item
    function showControls() {
      document.getElementById('itemControls').style.display = 'block';
      document.getElementById('rotVal').textContent = 0;
      document.getElementById('scaleVal').textContent = selectedItem.userData.scale || 1;
      document.getElementById('rotateSlider').value = 0;
      document.getElementById('scaleSlider').value = selectedItem.userData.scale || 1;
    }

    function rotateSelected() {
      if (!selectedItem) return;
      const angle = parseFloat(document.getElementById('rotateSlider').value) * Math.PI / 180;
      selectedItem.rotation.y = angle;
      document.getElementById('rotVal').textContent = document.getElementById('rotateSlider').value;
    }

    function scaleSelected() {
      if (!selectedItem) return;
      const s = parseFloat(document.getElementById('scaleSlider').value);
      selectedItem.scale.set(s, s, s);
      selectedItem.userData.scale = s;
      document.getElementById('scaleVal').textContent = s.toFixed(1);
    }

    function deleteSelected() {
      if (selectedItem) {
        scene.remove(selectedItem);
        placedItems = placedItems.filter(i => i !== selectedItem);
        selectedItem = null;
        document.getElementById('itemControls').style.display = 'none';
      }
    }

    // X-Ray improved
    function toggleXRay() { xrayEnabled = document.getElementById('xray').checked; }

    function animate() {
      requestAnimationFrame(animate);
      controls.update();

      if (xrayEnabled) {
        const camPos = camera.position;
        [...mainWalls, ...innerWalls].forEach(wall => {
          const dist = camPos.distanceTo(wall.position);
          wall.material.transparent = true;
          wall.material.opacity = dist < 4 ? 0.1 : 1;
        });
      }

      renderer.render(scene, camera);
    }

    function updateMainRoom() {
      const w = parseFloat(document.getElementById('mainWidth').value);
      const l = parseFloat(document.getElementById('mainLength').value);
      document.getElementById('mainWVal').textContent = w.toFixed(1);
      document.getElementById('mainLVal').textContent = l.toFixed(1);
      createMainRoom(w, l);
    }

    function addSelectedFixture() {
      const val = document.getElementById('fixtureSelect').value;
      if (val) addFixture(parseInt(val));
    }

    function addSelectedPipe() {
      const val = document.getElementById('pipeSelect').value;
      if (val) addPipe(parseInt(val));
    }

    function saveDesign() { /* same as before */ alert("Design saved as JSON!"); }

    function getQuote() { alert("Quote request sent with your design!"); }

    window.onload = init;
    window.addEventListener('resize', () => {
      camera.aspect = (window.innerWidth * 0.62) / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth * 0.62, window.innerHeight);
    });
  </script>
</body>
</html>
