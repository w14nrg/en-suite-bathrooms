<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>En-Suite 3D Planner</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<style>

body{
margin:0;
font-family:Arial;
overflow:hidden;
background:#111;
}

#ui{
position:absolute;
top:20px;
left:20px;
width:230px;
background:white;
padding:15px;
border-radius:10px;
border:3px solid #d4af37;
}

button{
width:100%;
padding:10px;
margin-top:10px;
background:#d4af37;
border:none;
color:white;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#b3922c;
}

</style>
</head>

<body>

<div id="ui">

<b>Fixtures</b>

<button onclick="addFixture('toilet')">Toilet</button>
<button onclick="addFixture('basin')">Basin</button>
<button onclick="addFixture('shower')">Shower</button>
<button onclick="addFixture('bath')">Bath</button>
<button onclick="deleteSelected()">Delete Selected</button>

</div>

<script>

let scene
let camera
let renderer
let controls

let floor
let walls=[]

let items=[]
let selected=null

const raycaster=new THREE.Raycaster()
const mouse=new THREE.Vector2()

init()

function init(){

scene=new THREE.Scene()
scene.background=new THREE.Color(0x111111)

camera=new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.set(6,4,6)

renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
renderer.shadowMap.enabled=true

document.body.appendChild(renderer.domElement)

controls=new THREE.OrbitControls(camera,renderer.domElement)
controls.enableDamping=true

createLights()

createRoom(6,6)

animate()

}

function createLights(){

const ambient=new THREE.AmbientLight(0xffffff,.6)
scene.add(ambient)

const sun=new THREE.DirectionalLight(0xffffff,1)

sun.position.set(5,10,5)
sun.castShadow=true
sun.shadow.mapSize.width=2048
sun.shadow.mapSize.height=2048

scene.add(sun)

}

function createRoom(w,l){

const texLoader=new THREE.TextureLoader()

const floorTex=texLoader.load("https://threejs.org/examples/textures/uv_grid_opengl.jpg")

floorTex.wrapS=THREE.RepeatWrapping
floorTex.wrapT=THREE.RepeatWrapping
floorTex.repeat.set(4,4)

const floorMat=new THREE.MeshStandardMaterial({
map:floorTex,
roughness:.5
})

floor=new THREE.Mesh(
new THREE.PlaneGeometry(w,l),
floorMat
)

floor.rotation.x=-Math.PI/2
floor.receiveShadow=true

scene.add(floor)

const wallMat=new THREE.MeshStandardMaterial({color:0xdddddd})

const h=2.4
const t=.15

const wall1=new THREE.Mesh(new THREE.BoxGeometry(w,h,t),wallMat)
wall1.position.set(0,h/2,l/2)

const wall2=new THREE.Mesh(new THREE.BoxGeometry(w,h,t),wallMat)
wall2.position.set(0,h/2,-l/2)

const wall3=new THREE.Mesh(new THREE.BoxGeometry(t,h,l),wallMat)
wall3.position.set(w/2,h/2,0)

const wall4=new THREE.Mesh(new THREE.BoxGeometry(t,h,l),wallMat)
wall4.position.set(-w/2,h/2,0)

wall1.receiveShadow=true
wall2.receiveShadow=true
wall3.receiveShadow=true
wall4.receiveShadow=true

scene.add(wall1,wall2,wall3,wall4)

walls=[wall1,wall2,wall3,wall4]

}

function addFixture(type){

let geo

const mat=new THREE.MeshStandardMaterial({color:0xffffff})

if(type==="toilet"){
geo=new THREE.CylinderGeometry(.25,.25,.5,32)
}

if(type==="basin"){
geo=new THREE.BoxGeometry(.6,.25,.45)
}

if(type==="shower"){
geo=new THREE.BoxGeometry(.9,2,.9)
}

if(type==="bath"){
geo=new THREE.CapsuleGeometry(.35,1.2,8,16)
}

const mesh=new THREE.Mesh(geo,mat)

mesh.castShadow=true

mesh.position.set(
(Math.random()-.5)*3,
.5,
(Math.random()-.5)*3
)

scene.add(mesh)

items.push(mesh)

}

window.addEventListener("pointerdown",e=>{

mouse.x=(e.clientX/window.innerWidth)*2-1
mouse.y=-(e.clientY/window.innerHeight)*2+1

raycaster.setFromCamera(mouse,camera)

const hits=raycaster.intersectObjects(items)

if(hits.length){

selected=hits[0].object
controls.enabled=false

}else{

selected=null
controls.enabled=true

}

})

window.addEventListener("pointermove",e=>{

if(!selected)return

mouse.x=(e.clientX/window.innerWidth)*2-1
mouse.y=-(e.clientY/window.innerHeight)*2+1

raycaster.setFromCamera(mouse,camera)

const hit=raycaster.intersectObject(floor)

if(hit.length){

selected.position.x=hit[0].point.x
selected.position.z=hit[0].point.z

}

})

window.addEventListener("pointerup",()=>{

controls.enabled=true

})

function deleteSelected(){

if(!selected)return

scene.remove(selected)

items=items.filter(i=>i!==selected)

selected=null

}

function animate(){

requestAnimationFrame(animate)

controls.update()

renderer.render(scene,camera)

}

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

})

</script>

</body>
</html>
