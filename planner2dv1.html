<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>En-Suite & Bathroom 2D Planner</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
<style>
  body{margin:0;font-family:system-ui;background:#f1f3f6;overflow:hidden;}
  header{height:60px;background:white;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;padding:0 20px;font-weight:600;font-size:18px;}
  #controls{height:60px;background:#ffffff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:10px;padding:0 20px;flex-wrap:wrap;}
  select,button{padding:8px 14px;border-radius:8px;border:1px solid #d1d5db;background:white;cursor:pointer;font-size:14px;}
  button:hover{background:#f8fafc;}
  canvas{border:none;background:#f8fafc;}
</style>
</head>
<body>
<header>En-Suite & Bathroom 2D Planner</header>
<div id="controls">
  <select id="toolSelect">
    <option value="select">Select / Move</option>
    <option value="wall">Draw Wall</option>
    <option value="erase">Erase</option>
  </select>
  <select id="fixtureSelect">
    <option value="">Add Fixture</option>
    <optgroup label="Sanitary">
      <option value="toilet">Toilet</option>
      <option value="bathAlcove">Alcove Bath</option>
      <option value="bathFree">Freestanding Bath</option>
      <option value="shower">Shower Enclosure</option>
      <option value="basinWall">Wall Hung Basin</option>
      <option value="basinPedestal">Pedestal Basin</option>
      <option value="bidet">Bidet</option>
    </optgroup>
    <optgroup label="Heating & Furniture">
      <option value="towelRad">Towel Radiator</option>
      <option value="vanity">Vanity Unit</option>
      <option value="ledMirror">LED Mirror</option>
    </optgroup>
    <optgroup label="External / Others">
      <option value="door">Door</option>
      <option value="window">Window</option>
    </optgroup>
  </select>
  <button onclick="rotateSelected()">Rotate 90°</button>
  <button onclick="deleteSelected()">Delete</button>
  <button onclick="exportPNG()">Export PNG</button>
</div>
<canvas id="c"></canvas>

<script>
const canvas = new fabric.Canvas('c', { selection: true });
canvas.setHeight(window.innerHeight - 120);
canvas.setWidth(window.innerWidth);

const GRID = 20;
let tool = "select";
let wallDrawing = false;
let wallLine = null;

// Grid
function drawGrid() {
  canvas.getObjects().filter(o => o.isGrid).forEach(o => canvas.remove(o));
  for(let i = 0; i < 2000; i += GRID) {
    canvas.add(new fabric.Line([i, 0, i, 2000], {stroke: '#e2e8f0', selectable: false, evented: false, isGrid: true}));
    canvas.add(new fabric.Line([0, i, 2000, i], {stroke: '#e2e8f0', selectable: false, evented: false, isGrid: true}));
  }
}
drawGrid();

// Tool & fixture select
document.getElementById("toolSelect").onchange = function() { tool = this.value; };
document.getElementById("fixtureSelect").onchange = function() {
  if (this.value) {
    addFixture(this.value);
    this.value = "";
  }
};

// Mouse events (bug fix + snapping)
canvas.on("mouse:down", function(opt) {
  const target = canvas.findTarget(opt.e);
  if (tool === "wall" && !target) {
    wallDrawing = true;
    let p = canvas.getPointer(opt.e);
    p.x = Math.round(p.x / GRID) * GRID;
    p.y = Math.round(p.y / GRID) * GRID;
    wallLine = new fabric.Line([p.x, p.y, p.x, p.y], {
      stroke: "#334155", strokeWidth: 10, selectable: true,
      strokeLineCap: 'round', strokeLineJoin: 'round'
    });
    canvas.add(wallLine);
  } else if (tool === "erase" && target) {
    canvas.remove(target);
  }
});

canvas.on("mouse:move", function(opt) {
  if (wallDrawing && wallLine) {
    let p = canvas.getPointer(opt.e);
    p.x = Math.round(p.x / GRID) * GRID;
    p.y = Math.round(p.y / GRID) * GRID;
    wallLine.set({x2: p.x, y2: p.y});
    canvas.renderAll();
  }
});

canvas.on("mouse:up", function() {
  if (wallDrawing) {
    wallDrawing = false;
    if (wallLine && Math.abs(wallLine.x2 - wallLine.x1) < 15 && Math.abs(wallLine.y2 - wallLine.y1) < 15) {
      canvas.remove(wallLine); // remove accidental tiny lines
    }
    wallLine = null;
  }
});

// Snap objects while moving
canvas.on('object:moving', function(opt) {
  const obj = opt.target;
  if (!obj) return;
  if (obj.type === 'line') {
    obj.set({
      x1: Math.round(obj.x1 / GRID) * GRID,
      y1: Math.round(obj.y1 / GRID) * GRID,
      x2: Math.round(obj.x2 / GRID) * GRID,
      y2: Math.round(obj.y2 / GRID) * GRID
    });
  } else {
    obj.set({
      left: Math.round(obj.left / GRID) * GRID,
      top: Math.round(obj.top / GRID) * GRID
    });
  }
});

// Zoom
canvas.on("mouse:wheel", function(opt) {
  let zoom = canvas.getZoom();
  zoom *= opt.e.deltaY > 0 ? 0.97 : 1.03;
  zoom = Math.min(Math.max(zoom, 0.2), 5);
  canvas.zoomToPoint({x: opt.e.offsetX, y: opt.e.offsetY}, zoom);
  opt.e.preventDefault();
});

// Helpers
function rotateSelected() {
  const obj = canvas.getActiveObject();
  if (obj) { obj.rotate((obj.angle || 0) + 90); canvas.renderAll(); }
}
function deleteSelected() {
  const obj = canvas.getActiveObject();
  if (obj) canvas.remove(obj);
}
function exportPNG() {
  const link = document.createElement("a");
  link.download = "bathroom-plan.png";
  link.href = canvas.toDataURL({format: 'png', multiplier: 2});
  link.click();
}

// Realistic fixtures (top-down style like Victorian Plumbing)
function addFixture(type) {
  let obj;

  switch(type) {
    case "toilet":
      const bowl = new fabric.Ellipse({rx: 32, ry: 26, fill: "#f1f5f9", stroke: "#1e2937", strokeWidth: 4});
      const tank = new fabric.Rect({width: 42, height: 22, rx: 4, fill: "#f1f5f9", stroke: "#1e2937", strokeWidth: 4, top: -29, left: -21});
      const seat = new fabric.Ellipse({rx: 26, ry: 19, fill: "#cbd5e1", stroke: "#475569", strokeWidth: 3, top: 3});
      obj = new fabric.Group([tank, bowl, seat], {originX: 'center', originY: 'center'});
      break;

    case "bathAlcove":
      const outer = new fabric.Rect({width: 170, height: 72, rx: 15, fill: "#e0f2fe", stroke: "#0369a1", strokeWidth: 8});
      const inner = new fabric.Rect({width: 152, height: 50, rx: 10, fill: "#bae6fd", top: 11, left: 9});
      const mixer = new fabric.Rect({width: 18, height: 9, fill: "#64748b", top: -8, left: 55, rx: 2});
      const tap = new fabric.Circle({radius: 7, fill: "#94a3b8", top: -16, left: 68});
      obj = new fabric.Group([outer, inner, mixer, tap], {originX: 'center', originY: 'center'});
      break;

    case "bathFree":
      const outerF = new fabric.Rect({width: 175, height: 78, rx: 28, fill: "#e0f2fe", stroke: "#0369a1", strokeWidth: 7});
      const innerF = new fabric.Rect({width: 148, height: 52, rx: 18, fill: "#bae6fd", top: 13, left: 13.5});
      obj = new fabric.Group([outerF, innerF], {originX: 'center', originY: 'center'});
      break;

    case "shower":
      const tray = new fabric.Rect({width: 90, height: 90, rx: 8, fill: "#f1f5f9", stroke: "#475569", strokeWidth: 6});
      const glass = new fabric.Rect({width: 78, height: 78, rx: 4, fill: "#e0f2fe", stroke: "#64748b", strokeWidth: 3, top:6, left:6});
      const head = new fabric.Circle({radius: 9, fill: "#cbd5e1", stroke: "#1e2937", top: -22, left: 20});
      const pipe = new fabric.Line([25, -22, 35, -35], {stroke: "#334155", strokeWidth: 4});
      const drain = new fabric.Circle({radius: 6, fill: "#64748b", top: 32, left: 32});
      obj = new fabric.Group([tray, glass, pipe, head, drain], {originX: 'center', originY: 'center'});
      break;

    case "basinWall":
      const basinTop = new fabric.Ellipse({rx: 35, ry: 22, fill: "#f1f5f9", stroke: "#1e2937", strokeWidth: 4});
      const back = new fabric.Rect({width: 48, height: 12, fill: "#e2e8f0", top: -18, left: -24});
      const bTap = new fabric.Rect({width: 8, height: 18, fill: "#64748b", top: -25, left: 8, rx: 2});
      obj = new fabric.Group([back, basinTop, bTap], {originX: 'center', originY: 'center'});
      break;

    case "basinPedestal":
      const pBasin = new fabric.Ellipse({rx: 35, ry: 22, fill: "#f1f5f9", stroke: "#1e2937", strokeWidth: 4});
      const pedestal = new fabric.Rect({width: 22, height: 35, fill: "#e2e8f0", stroke: "#1e2937", top: 22, left: -11, rx: 3});
      const pTap = new fabric.Rect({width: 8, height: 18, fill: "#64748b", top: -25, left: 8});
      obj = new fabric.Group([pedestal, pBasin, pTap], {originX: 'center', originY: 'center'});
      break;

    case "bidet":
      obj = new fabric.Ellipse({rx: 30, ry: 24, fill: "#f1f5f9", stroke: "#1e2937", strokeWidth: 4});
      break;

    case "towelRad":
      const radBody = new fabric.Rect({width: 26, height: 95, rx: 4, fill: "#f1f5f9", stroke: "#334155", strokeWidth: 5});
      const bars = [];
      for(let i = 0; i < 6; i++) {
        bars.push(new fabric.Rect({width: 18, height: 5, fill: "#cbd5e1", top: 12 + i*12, left: 4}));
      }
      obj = new fabric.Group([radBody, ...bars], {originX: 'center', originY: 'center'});
      break;

    case "vanity":
      obj = new fabric.Rect({width: 95, height: 48, rx: 6, fill: "#fcd34d", stroke: "#b45309", strokeWidth: 4});
      break;

    case "ledMirror":
      const mirror = new fabric.Rect({width: 65, height: 55, rx: 6, fill: "#e0f2fe", stroke: "#0369a1", strokeWidth: 5});
      const frame = new fabric.Rect({width: 71, height: 61, rx: 8, fill: "", stroke: "#1e2937", strokeWidth: 6});
      obj = new fabric.Group([frame, mirror], {originX: 'center', originY: 'center'});
      break;

    case "door":
      obj = new fabric.Rect({width: 12, height: 85, fill: "#78350f", stroke: "#451a03", strokeWidth: 3});
      break;

    case "window":
      obj = new fabric.Rect({width: 75, height: 42, fill: "#bae6fd", stroke: "#0369a1", strokeWidth: 6});
      break;

    default:
      obj = new fabric.Rect({width: 60, height: 60, fill: "#94a3b8", stroke: "#1e2937"});
  }

  if (obj) {
    obj.set({
      left: Math.round(450 / GRID) * GRID,
      top: Math.round(350 / GRID) * GRID,
      hasRotatingPoint: true,
      cornerSize: 10,
      transparentCorners: false,
      cornerColor: '#3b82f6'
    });
    canvas.add(obj);
    canvas.setActiveObject(obj);
    canvas.renderAll();
  }
}

// Resize
window.addEventListener("resize", () => {
  canvas.setHeight(window.innerHeight - 120);
  canvas.setWidth(window.innerWidth);
  canvas.renderAll();
});
</script>
</body>
</html>
