<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>En-Suite & Bathroom 2D Planner</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
<style>
body{margin:0;font-family:system-ui;background:#f1f3f6;overflow:hidden;}
header{height:60px;background:white;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;padding:0 20px;font-weight:600;font-size:18px;}
#controls{height:60px;background:#ffffff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:10px;padding:0 20px;flex-wrap: wrap;}
select,button{padding:6px 12px;border-radius:6px;border:1px solid #d1d5db;background:white;cursor:pointer;}
canvas{border:none;background:#f8fafc;}
</style>
</head>
<body>
<header>En-Suite & Bathroom 2D Planner</header>
<div id="controls">
<select id="toolSelect">
<option value="select">Select Tool</option>
<option value="wall">Draw Wall</option>
<option value="erase">Erase</option>
</select>
<select id="fixtureSelect">
<option value="">Add Fixture</option>
<optgroup label="Sanitary">
<option value="toilet">Toilet</option>
<option value="bathAlcove">Alcove Bath</option>
<option value="bathFree">Freestanding Bath</option>
<option value="shower">Shower</option>
<option value="basinWall">Wall Hung Basin</option>
<option value="basinPedestal">Pedestal Basin</option>
<option value="bidet">Bidet</option>
</optgroup>
<optgroup label="Heating & Furniture">
<option value="towelRad">Towel Radiator</option>
<option value="vanity">Vanity Unit</option>
<option value="ledMirror">LED Mirror</option>
</optgroup>
<optgroup label="External / Others">
<option value="door">Door</option>
<option value="window">Window</option>
<option value="manhole">Manhole</option>
<option value="grass">Grass</option>
<option value="socket">Socket</option>
<option value="light">Light</option>
<option value="switch">Switch</option>
<option value="pipeHot">Hot Pipe</option>
<option value="pipeCold">Cold Pipe</option>
<option value="drain">Drain</option>
</optgroup>
</select>
<button onclick="rotateSelected()">Rotate 90°</button>
<button onclick="deleteSelected()">Delete</button>
<button onclick="exportPNG()">Export PNG</button>
</div>
<canvas id="c"></canvas>

<script>
const canvas = new fabric.Canvas('c',{ selection:true });
canvas.setHeight(window.innerHeight - 120);
canvas.setWidth(window.innerWidth);
const GRID=50;
let tool="select";
let wallDrawing=false;
let wallLine;

// Draw visible grid
for(let i=0;i<1500;i++){
  canvas.add(new fabric.Line([i*GRID,0,i*GRID,10000],{stroke:'#cbd5e1', selectable:false, evented:false}));
  canvas.add(new fabric.Line([0,i*GRID,10000,i*GRID],{stroke:'#cbd5e1', selectable:false, evented:false}));
}

// Resize
window.addEventListener("resize",()=>{
  canvas.setHeight(window.innerHeight - 120);
  canvas.setWidth(window.innerWidth);
  canvas.renderAll();
});

// Tools
document.getElementById("toolSelect").onchange=function(){ tool=this.value; };
document.getElementById("fixtureSelect").onchange=function(){ if(this.value) addFixture(this.value); this.value=""; };

// FIXED WALL DRAWING - only draw on empty space
canvas.on("mouse:down", function(opt){
  if(tool==="wall"){
    if(canvas.findTarget(opt.e)) return; // ← THIS STOPS WALL WHEN CLICKING FIXTURES
    wallDrawing=true;
    const p = canvas.getPointer(opt.e);
    wallLine=new fabric.Line([p.x,p.y,p.x,p.y],{
      stroke:"#4b5563", strokeWidth:6, selectable:true
    });
    canvas.add(wallLine);
  } else if(tool==="erase"){
    const obj = canvas.findTarget(opt.e);
    if(obj) canvas.remove(obj);
  }
});
canvas.on("mouse:move",function(opt){
  if(wallDrawing){
    const p=canvas.getPointer(opt.e);
    wallLine.set({x2:p.x,y2:p.y});
    canvas.renderAll();
  }
});
canvas.on("mouse:up",function(){ wallDrawing=false; });

// Zoom
canvas.on("mouse:wheel",function(opt){
  let zoom = canvas.getZoom();
  zoom *= 0.999 ** opt.e.deltaY;
  if(zoom>3) zoom=3; if(zoom<0.2) zoom=0.2;
  canvas.zoomToPoint({x:opt.e.offsetX,y:opt.e.offsetY}, zoom);
  opt.e.preventDefault();
});

// Helpers
function rotateSelected(){
  const obj = canvas.getActiveObject();
  if(obj){ obj.rotate((obj.angle||0)+90); canvas.renderAll(); }
}
function deleteSelected(){
  const obj = canvas.getActiveObject();
  if(obj) canvas.remove(obj);
}
function exportPNG(){
  const link=document.createElement("a");
  link.download="bathroom-plan.png";
  link.href=canvas.toDataURL({format:'png', multiplier:2});
  link.click();
}

// Realistic fixtures (top-down like Victorian Plumbing)
function addFixture(type){
  let obj;
  switch(type){
    case "toilet":
      const bowl = new fabric.Ellipse({rx:32, ry:26, fill:"#f1f5f9", stroke:"#1e2937", strokeWidth:4});
      const tank = new fabric.Rect({width:42, height:22, fill:"#f1f5f9", stroke:"#1e2937", strokeWidth:4, top:-29, left:-21});
      const seat = new fabric.Ellipse({rx:26, ry:19, fill:"#cbd5e1", stroke:"#475569", strokeWidth:3, top:3});
      obj = new fabric.Group([tank, bowl, seat]);
      break;
    case "bathAlcove":
      const outer = new fabric.Rect({width:170, height:72, rx:15, fill:"#e0f2fe", stroke:"#0369a1", strokeWidth:8});
      const inner = new fabric.Rect({width:152, height:50, rx:10, fill:"#bae6fd", top:11, left:9});
      const tap = new fabric.Rect({width:18, height:9, fill:"#64748b", top:-8, left:55});
      obj = new fabric.Group([outer, inner, tap]);
      break;
    case "bathFree":
      const outerF = new fabric.Rect({width:175, height:78, rx:28, fill:"#e0f2fe", stroke:"#0369a1", strokeWidth:7});
      const innerF = new fabric.Rect({width:148, height:52, rx:18, fill:"#bae6fd", top:13, left:13.5});
      obj = new fabric.Group([outerF, innerF]);
      break;
    case "shower":
      const tray = new fabric.Rect({width:90, height:90, rx:8, fill:"#f1f5f9", stroke:"#475569", strokeWidth:6});
      const glass = new fabric.Rect({width:78, height:78, fill:"transparent", stroke:"#64748b", strokeWidth:3, top:6, left:6});
      const head = new fabric.Circle({radius:9, fill:"#cbd5e1", top:-22, left:20});
      obj = new fabric.Group([tray, glass, head]);
      break;
    case "basinWall":
      const basin = new fabric.Ellipse({rx:35, ry:22, fill:"#f1f5f9", stroke:"#1e2937", strokeWidth:4});
      const bTap = new fabric.Rect({width:8, height:18, fill:"#64748b", top:-25, left:8});
      obj = new fabric.Group([basin, bTap]);
      break;
    case "basinPedestal":
      const pBasin = new fabric.Ellipse({rx:35, ry:22, fill:"#f1f5f9", stroke:"#1e2937", strokeWidth:4});
      const pedestal = new fabric.Rect({width:22, height:35, fill:"#e2e8f0", stroke:"#1e2937", top:22, left:-11});
      const pTap = new fabric.Rect({width:8, height:18, fill:"#64748b", top:-25, left:8});
      obj = new fabric.Group([pBasin, pedestal, pTap]);
      break;
    case "bidet":
      obj = new fabric.Ellipse({rx:30, ry:24, fill:"#f1f5f9", stroke:"#1e2937", strokeWidth:4});
      break;
    case "towelRad":
      obj = new fabric.Rect({width:26, height:95, fill:"#f1f5f9", stroke:"#334155", strokeWidth:5});
      break;
    case "vanity":
      obj = new fabric.Rect({width:95, height:48, fill:"#fcd34d", stroke:"#b45309", strokeWidth:4});
      break;
    case "ledMirror":
      obj = new fabric.Rect({width:65, height:55, fill:"#e0f2fe", stroke:"#0369a1", strokeWidth:5});
      break;
    case "door":
      obj = new fabric.Rect({width:15, height:70, fill:"#78350f", stroke:"#111", strokeWidth:2});
      break;
    case "window":
      obj = new fabric.Rect({width:60, height:40, fill:"#dbeafe", stroke:"#0284c7", strokeWidth:2});
      break;
    case "manhole":
      obj=new fabric.Circle({radius:30,fill:"#1e2937",stroke:"#64748b",strokeWidth:3});
      break;
    case "grass":
      obj=new fabric.Rect({width:80,height:40,fill:"#4ade80",stroke:"#166534",strokeWidth:2});
      break;
    case "socket":
      obj=new fabric.Circle({radius:8,fill:"#fcd34d",stroke:"#b45309",strokeWidth:2});
      break;
    case "light":
      obj=new fabric.Circle({radius:12,fill:"#facc15",stroke:"#78350f",strokeWidth:2});
      break;
    case "switch":
      obj=new fabric.Rect({width:10,height:20,fill:"#fbbf24",stroke:"#b45309",strokeWidth:2});
      break;
    case "pipeHot":
      obj=new fabric.Line([0,0,60,0],{stroke:"#ef4444",strokeWidth:6});
      break;
    case "pipeCold":
      obj=new fabric.Line([0,0,60,0],{stroke:"#3b82f6",strokeWidth:6});
      break;
    case "drain":
      obj=new fabric.Line([0,0,60,0],{stroke:"#111",strokeWidth:6, strokeDashArray:[15,10]});
      break;
  }

  if(obj){
    obj.set({ left:400, top:300, hasRotatingPoint:true, cornerSize:12, transparentCorners:false });
    canvas.add(obj);
    canvas.setActiveObject(obj);
    canvas.renderAll();
  }
}
</script>
</body>
</html>
