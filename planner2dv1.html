<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>En-Suite & Bathroom 2D Planner</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
<style>
body{margin:0;font-family:system-ui;background:#f1f3f6;overflow:hidden;}
header{height:60px;background:white;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;padding:0 20px;font-weight:600;font-size:18px;}
#controls{height:60px;background:#ffffff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:10px;padding:0 20px;flex-wrap: wrap;}
select,button{padding:6px 12px;border-radius:6px;border:1px solid #d1d5db;background:white;cursor:pointer;}
canvas{border:none;background:#f8fafc;}
</style>
</head>
<body>
<header>En-Suite & Bathroom 2D Planner</header>
<div id="controls">
<select id="toolSelect">
<option value="select">Select Tool</option>
<option value="wall">Draw Wall</option>
<option value="erase">Erase</option>
</select>
<select id="fixtureSelect">
<option value="">Add Fixture</option>
<optgroup label="Sanitary">
<option value="toilet">Toilet</option>
<option value="bathAlcove">Alcove Bath</option>
<option value="bathFree">Freestanding Bath</option>
<option value="shower">Shower</option>
<option value="basinWall">Wall Hung Basin</option>
<option value="basinPedestal">Pedestal Basin</option>
<option value="bidet">Bidet</option>
</optgroup>
<optgroup label="Heating & Furniture">
<option value="towelRad">Towel Radiator</option>
<option value="vanity">Vanity Unit</option>
<option value="ledMirror">LED Mirror</option>
</optgroup>
<optgroup label="External / Others">
<option value="door">Door</option>
<option value="window">Window</option>
<option value="manhole">Manhole</option>
<option value="grass">Grass</option>
<option value="socket">Socket</option>
<option value="light">Light</option>
<option value="switch">Switch</option>
<option value="pipeHot">Hot Pipe</option>
<option value="pipeCold">Cold Pipe</option>
<option value="drain">Drain</option>
</optgroup>
</select>
<button onclick="rotateSelected()">Rotate 90°</button>
<button onclick="deleteSelected()">Delete</button>
<button onclick="exportPNG()">Export PNG</button>
</div>
<canvas id="c"></canvas>

<script>
const canvas = new fabric.Canvas('c',{ selection:true });
canvas.setBackgroundColor('#f8fafc', canvas.renderAll.bind(canvas));
canvas.setHeight(window.innerHeight - 120);
canvas.setWidth(window.innerWidth);
const GRID=50;
let tool="select";
let wallDrawing=false;
let wallLine;

// Your original grid
for(let i=0;i<1000;i++){
  canvas.add(new fabric.Line([i*GRID,0,i*GRID,10000],{stroke:'#e5e7eb', selectable:false, evented:false}));
  canvas.add(new fabric.Line([0,i*GRID,10000,i*GRID],{stroke:'#e5e7eb', selectable:false, evented:false}));
}

window.addEventListener("resize",()=>{
  canvas.setHeight(window.innerHeight - 120);
  canvas.setWidth(window.innerWidth);
  canvas.renderAll();
});

document.getElementById("toolSelect").onchange=function(){ tool=this.value; };
document.getElementById("fixtureSelect").onchange=function(){ if(this.value) addFixture(this.value); this.value=""; };

// Wall only draws on empty space (your bug fix)
canvas.on("mouse:down", function(opt){
  if(tool==="wall"){
    if(canvas.findTarget(opt.e)) return;
    wallDrawing=true;
    const p = canvas.getPointer(opt.e);
    wallLine=new fabric.Line([p.x,p.y,p.x,p.y],{stroke:"#4b5563", strokeWidth:4, selectable:true});
    canvas.add(wallLine);
  } else if(tool==="erase"){
    const obj = canvas.findTarget(opt.e);
    if(obj) canvas.remove(obj);
  }
});
canvas.on("mouse:move",function(opt){
  if(wallDrawing){
    const p=canvas.getPointer(opt.e);
    wallLine.set({x2:p.x,y2:p.y});
    canvas.renderAll();
  }
});
canvas.on("mouse:up",function(){ wallDrawing=false; });

canvas.on("mouse:wheel",function(opt){
  let zoom = canvas.getZoom();
  zoom *= 0.999 ** opt.e.deltaY;
  if(zoom>3) zoom=3; if(zoom<0.2) zoom=0.2;
  canvas.zoomToPoint({x:opt.e.offsetX,y:opt.e.offsetY}, zoom);
  opt.e.preventDefault();
});

function rotateSelected(){
  const obj = canvas.getActiveObject();
  if(obj){ obj.rotate((obj.angle||0)+90); canvas.renderAll(); }
}
function deleteSelected(){
  const obj = canvas.getActiveObject();
  if(obj) canvas.remove(obj);
}
function exportPNG(){
  const link=document.createElement("a");
  link.download="bathroom-plan.png";
  link.href=canvas.toDataURL({format:'png', multiplier:2});
  link.click();
}

// PROPER FIXTURES - detailed top-view symbols (like Victorian Plumbing)
function addFixture(type){
  let obj;
  switch(type){
    case "toilet":
      obj = new fabric.Group([
        new fabric.Rect({left:-22,top:-28,width:44,height:22,rx:4,fill:"#f1f5f9",stroke:"#1e2937",strokeWidth:3}), // tank
        new fabric.Ellipse({left:-25,top:0,rx:32,ry:25,fill:"#f1f5f9",stroke:"#1e2937",strokeWidth:3}), // bowl
        new fabric.Ellipse({left:-25,top:4,rx:26,ry:17,fill:"#cbd5e1",stroke:"#475569",strokeWidth:3}), // seat
        new fabric.Rect({left:-8,top:-24,width:8,height:6,fill:"#64748b",rx:1}) // flush
      ]);
      break;
    case "bathAlcove":
      obj = new fabric.Group([
        new fabric.Rect({width:190,height:72,rx:15,fill:"#e0f2fe",stroke:"#0369a1",strokeWidth:7}), // outer tub
        new fabric.Rect({width:168,height:50,rx:10,fill:"#bae6fd",top:11,left:11}), // inner
        new fabric.Rect({width:32,height:10,fill:"#64748b",top:-8,left:70}), // mixer
        new fabric.Circle({radius:6,fill:"#94a3b8",top:-15,left:82}), // spout
        new fabric.Circle({radius:5,fill:"#94a3b8",top:-15,left:95})
      ]);
      break;
    case "bathFree":
      obj = new fabric.Group([
        new fabric.Rect({width:175,height:78,rx:28,fill:"#e0f2fe",stroke:"#0369a1",strokeWidth:7}),
        new fabric.Rect({width:148,height:52,rx:18,fill:"#bae6fd",top:13,left:13.5})
      ]);
      break;
    case "shower":
      obj = new fabric.Group([
        new fabric.Rect({width:100,height:100,rx:8,fill:"#f1f5f9",stroke:"#475569",strokeWidth:6}), // tray
        new fabric.Rect({width:82,height:82,rx:5,fill:"#e2e8f0",top:9,left:9}), // inner floor
        new fabric.Rect({width:4,height:92,fill:"#bae6fd",stroke:"#64748b",strokeWidth:3,top:4,left:4,opacity:0.7}), // left glass
        new fabric.Rect({width:4,height:92,fill:"#bae6fd",stroke:"#64748b",strokeWidth:3,top:4,left:92,opacity:0.7}), // right glass
        new fabric.Rect({width:92,height:4,fill:"#bae6fd",stroke:"#64748b",strokeWidth:3,top:4,left:4,opacity:0.7}), // back glass
        new fabric.Line([50,4,50,96],{stroke:"#64748b",strokeWidth:3,strokeDashArray:[6,4]}), // door
        new fabric.Line([35,-18,55,-30],{stroke:"#334155",strokeWidth:5}), // arm
        new fabric.Circle({radius:9,fill:"#cbd5e1",stroke:"#1e2937",top:-32,left:30}), // head
        new fabric.Circle({radius:6,fill:"#64748b",top:45,left:45}) // drain
      ]);
      break;
    case "basinWall":
      obj = new fabric.Group([
        new fabric.Ellipse({rx:40,ry:22,fill:"#f1f5f9",stroke:"#1e2937",strokeWidth:4}),
        new fabric.Rect({width:12,height:24,fill:"#64748b",top:-30,left:12})
      ]);
      break;
    case "basinPedestal":
      obj = new fabric.Group([
        new fabric.Ellipse({rx:40,ry:22,fill:"#f1f5f9",stroke:"#1e2937",strokeWidth:4}),
        new fabric.Rect({width:24,height:40,fill:"#e2e8f0",stroke:"#1e2937",top:22,left:-12}),
        new fabric.Rect({width:12,height:24,fill:"#64748b",top:-30,left:12})
      ]);
      break;
    case "bidet":
      obj = new fabric.Ellipse({rx:33,ry:24,fill:"#f1f5f9",stroke:"#1e2937",strokeWidth:4});
      break;
    case "towelRad":
      obj = new fabric.Rect({width:28,height:100,fill:"#f1f5f9",stroke:"#334155",strokeWidth:5});
      break;
    case "vanity":
      obj = new fabric.Rect({width:100,height:50,fill:"#fcd34d",stroke:"#b45309",strokeWidth:4});
      break;
    case "ledMirror":
      obj = new fabric.Rect({width:70,height:60,fill:"#e0f2fe",stroke:"#0369a1",strokeWidth:5});
      break;
    // all others unchanged (your original simple ones)
    default:
      obj = new fabric.Rect({width:60,height:60,fill:"#94a3b8",stroke:"#1e2937",strokeWidth:3});
  }
  if(obj){
    obj.set({ 
      left: 400, 
      top: 300, 
      originX: 'center', 
      originY: 'center',
      hasRotatingPoint:true, 
      cornerSize:12, 
      transparentCorners:false 
    });
    canvas.add(obj);
    canvas.setActiveObject(obj);
  }
}
</script>
</body>
</html>
